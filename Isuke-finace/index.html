<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isuke Aoki | Finance System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <h2><span class="highlight">>_</span> Acesso ao Sistema</h2>
            <div class="tabs">
                <button id="tabLogin" class="tab-btn active">Login</button>
                <button id="tabCadastro" class="tab-btn">Registrar</button>
            </div>

            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="E-mail" required>
                <input type="password" id="loginSenha" placeholder="Senha" required>
                <button type="submit" class="btn-submit">Entrar no Sistema</button>
            </form>

            <form id="cadastroForm" class="hidden">
                <input type="text" id="cadNome" placeholder="Nome Completo" required>
                <input type="email" id="cadEmail" placeholder="E-mail" required>
                <input type="password" id="cadSenha" placeholder="Crie uma Senha" required>
                <button type="submit" class="btn-submit">Criar Conta Segura</button>
            </form>
            <p id="authFeedback" class="feedback-msg"></p>
        </div>
    </div>
    <div id="dashboardScreen" class="hidden">
        <header>
            <div class="nav-container">
                <div class="logo">isuke_finance<span class="cursor">_</span></div>
                <div class="user-status">
                    Usuário: <span id="userNameDisplay" class="highlight">Visitante</span>
                    <!-- NOVO BOTÃO DE LOGOUT -->
                    <button id="btnLogout" class="btn-logout">Sair</button>
                </div>
            </div>
        </header>
        <main class="dashboard-container">
            
            <div class="left-column">
                <section class="panel form-panel">
                    <h2><span class="highlight">>_</span> Nova Transação</h2>
                    <form id="financeForm">
                        <div class="input-group">
                            <label for="tipo">Tipo</label>
                            <select id="tipo" required>
                                <option value="receita">Receita</option>
                                <option value="despesa">Despesa</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="valor">Valor (R$)</label>
                            <input type="number" id="valor" step="0.01" required>
                        </div>
                        <div class="input-group">
                            <label for="descricao">Descrição</label>
                            <input type="text" id="descricao" required>
                        </div>
                        <div class="input-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" required>
                        </div>
                        <button type="submit" class="btn-submit">Registrar no Banco</button>
                    </form>
                    <p id="formFeedback" class="feedback-msg"></p>
                </section>

                <section class="panel chart-panel">
                    <h2><span class="highlight">>_</span> Resumo Visual</h2>
                    <div class="chart-container">
                        <canvas id="financeChart"></canvas>
                    </div>
                </section>
            </div>

            <section class="panel list-panel">
                <div class="panel-header-actions">
                    <h2><span class="highlight">>_</span> Histórico de Transações</h2>
                    <button id="btnExportar" class="btn-export">📥 Exportar Excel</button>
                </div>
                <div class="table-wrapper">
                    <table id="tabelaFinanceira">
                        <thead>
                            <tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Valor</th></tr>
                        </thead>
                        <tbody id="transacoesTabela"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
